<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Lender - Evaluate Application</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c1b 0%, #1a103c 50%, #0a0612 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #8b5cf6;
            --accent-secondary: #ec4899;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --card-glow: 0 8px 32px 0 rgba(139, 92, 246, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin-top: 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            width: 100%;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: var(--card-glow);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 8px 32px 0 rgba(139, 92, 246, 0.25);
        }

        .form-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.75rem;
            color: #a78bfa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-back-link {
            font-size: 0.9rem;
            color: var(--accent-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .btn-back-link:hover {
            color: var(--accent-primary);
        }

        form {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.2rem;
        }

        @media (min-width: 600px) {
            form {
                grid-template-columns: 1fr 1fr;
            }
            .full-width {
                grid-column: span 2;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        input, select {
            background: rgba(15, 12, 27, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 0.8rem 1rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
            width: 100%;
        }

        input:focus, select:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.3);
            background: rgba(15, 12, 27, 0.8);
        }

        select option {
            background: #0f0c1b;
            color: var(--text-main);
        }

        button.btn-submit {
            grid-column: span 2;
            background: linear-gradient(90deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border: none;
            border-radius: 12px;
            padding: 1rem;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
            margin-top: 1rem;
        }

        button.btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
        }

        button.btn-submit:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>
    <header>
        <h1>Smart Lender</h1>
        <p>Evaluate Loan Eligibility and Approval Risk</p>
    </header>

    <div class="container">
        <div class="card">
            <div class="form-title">
                <span>New Application Check</span>
                <a href="/" class="btn-back-link">← Back to Dashboard</a>
            </div>
            <form action="/predict" method="POST">
                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select name="gender" id="gender" required>
                        <option value="" disabled selected>Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="married">Married</label>
                    <select name="married" id="married" required>
                        <option value="" disabled selected>Select Status</option>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="dependents">Dependents</label>
                    <select name="dependents" id="dependents" required>
                        <option value="" disabled selected>No. of Dependents</option>
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3+">3+</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="education">Education</label>
                    <select name="education" id="education" required>
                        <option value="" disabled selected>Select Education</option>
                        <option value="Graduate">Graduate</option>
                        <option value="Not Graduate">Not Graduate</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="self_employed">Self Employed</label>
                    <select name="self_employed" id="self_employed" required>
                        <option value="" disabled selected>Self Employed?</option>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="credit_history">Credit History</label>
                    <select name="credit_history" id="credit_history" required>
                        <option value="" disabled selected>Credit Quality</option>
                        <option value="Good">Good (1.0)</option>
                        <option value="Bad">Bad (0.0)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="property_area">Property Area</label>
                    <select name="property_area" id="property_area" required>
                        <option value="" disabled selected>Select Area</option>
                        <option value="Urban">Urban</option>
                        <option value="Semiurban">Semiurban</option>
                        <option value="Rural">Rural</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="loan_amount_term">Loan Amount Term</label>
                    <select name="loan_amount_term" id="loan_amount_term" required>
                        <option value="360" selected>360 Months (30 Years)</option>
                        <option value="180">180 Months (15 Years)</option>
                        <option value="240">240 Months (20 Years)</option>
                        <option value="120">120 Months (10 Years)</option>
                        <option value="84">84 Months (7 Years)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="applicant_income">Applicant Monthly Income ($)</label>
                    <input type="number" name="applicant_income" id="applicant_income" placeholder="e.g. 5000" min="0" required>
                </div>

                <div class="form-group">
                    <label for="coapplicant_income">Coapplicant Monthly Income ($)</label>
                    <input type="number" name="coapplicant_income" id="coapplicant_income" placeholder="e.g. 1500" min="0" required>
                </div>

                <div class="form-group full-width">
                    <label for="loan_amount">Loan Amount (in Thousands, $)</label>
                    <input type="number" name="loan_amount" id="loan_amount" placeholder="e.g. 120 (for $120,000)" min="1" step="any" required>
                </div>

                <button type="submit" class="btn-submit">Evaluate Application</button>
            </form>
        </div>
    </div>
</body>
</html>
